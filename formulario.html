<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedir mi PawTag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #2D6A4F;
      --green-l: #40916C;
      --amber:   #F4A261;
      --bg:      #FAFAF8;
      --card:    #FFFFFF;
      --text:    #1A1A2E;
      --muted:   #5E6074;
      --border:  #E2E2DC;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%;
      height: 68px;
      background: rgba(250,250,248,.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .nav-logo svg { width: 36px; height: 36px; }
    .nav-logo span {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem; font-weight: 900;
      color: var(--green); letter-spacing: -0.5px;
    }

    .nav-back {
      display: inline-flex; align-items: center; gap: 8px;
      text-decoration: none; color: var(--muted);
      font-size: .9rem; font-weight: 500;
      transition: color .2s;
    }
    .nav-back:hover { color: var(--green); }
    .nav-back svg { width: 16px; height: 16px; }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 5% 60px;
    }

    .form-header {
      text-align: center;
      max-width: 560px;
      margin-bottom: 32px;
    }

    .form-eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      background: #EBF4EF; color: var(--green);
      font-size: .78rem; font-weight: 600; letter-spacing: .06em;
      padding: .3rem .9rem; border-radius: 50px;
      text-transform: uppercase; margin-bottom: 1rem;
    }

    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 900; color: var(--text);
      line-height: 1.2; margin-bottom: .8rem;
    }

    .form-title em { font-style: normal; color: var(--green); }

    .form-sub {
      font-size: .95rem; color: var(--muted); line-height: 1.7;
    }

    .form-steps {
      display: flex; gap: 2rem; justify-content: center;
      margin-top: 1.2rem; flex-wrap: wrap;
    }

    .form-step {
      display: flex; align-items: center; gap: 8px;
      font-size: .82rem; color: var(--muted); font-weight: 500;
    }

    .form-step-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--green); color: #fff;
      font-size: .72rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── TALLY EMBED ── */
    .tally-wrap {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border-radius: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }

    iframe {
      width: 100%;
      min-height: 800px;
      border: none;
      display: block;
    }

    @media (max-width: 600px) {
      main { padding: 24px 4% 40px; }
      .form-steps { gap: 1rem; }
      iframe { min-height: 900px; }
    }
  </style>
</head>
<body>

  <!-- ── NAV ── -->
  <nav>
    <a href="index.html" class="nav-logo">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="24" cy="29" rx="10" ry="9" fill="#2D6A4F"/>
        <ellipse cx="12" cy="22" rx="4.5" ry="5.5" fill="#2D6A4F"/>
        <ellipse cx="36" cy="22" rx="4.5" ry="5.5" fill="#2D6A4F"/>
        <ellipse cx="17" cy="16" rx="3.5" ry="4.5" fill="#2D6A4F"/>
        <ellipse cx="31" cy="16" rx="3.5" ry="4.5" fill="#2D6A4F"/>
      </svg>
      <span>PawTag</span>
    </a>
    <a href="index.html" class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Volver
    </a>
  </nav>

  <!-- ── MAIN ── -->
  <main>
    <div class="form-header">
      <span class="form-eyebrow">🐾 Paso 1 de 2</span>
      <h1 class="form-title">Cuéntanos sobre<br/><em>tu perro</em></h1>
      <p class="form-sub">Rellena el formulario con los datos de tu perro. Al enviarlo, pasarás al pago seguro y en pocos días recibirás tu PawTag.</p>
      <div class="form-steps">
        <span class="form-step"><span class="form-step-num">1</span> Datos del perro</span>
        <span class="form-step" style="opacity:.4"><span class="form-step-num" style="background:var(--muted)">2</span> Pago seguro</span>
      </div>
    </div>

    <div class="tally-wrap">
      <iframe
        src="https://tally.so/embed/lb4G26?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
        loading="lazy"
        title="Formulario PawTag"
      ></iframe>
    </div>
  </main>

</body>
</html>
